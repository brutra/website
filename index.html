  <style>
    :root {
      --ink: #1a1a18;
      --paper: #f5f3ee;
      --accent: #2d5a3d;
      --accent-light: #e8f0eb;
      --muted: #8a8880;
      --rule: #d4d0c8;
      --body-text: #444441;
      --serif: 'Cormorant Garamond', Georgia, serif;
      --sans: 'Instrument Sans', sans-serif;
      --mono: 'DM Mono', monospace;
    }

    [data-theme="dark"] {
      --ink: #e8e6e0;
      --paper: #16161a;
      --accent: #6aaa80;
      --accent-light: #1e2e22;
      --muted: #908d87;
      --rule: #38382e;
      --body-text: #b5b2ab;
    }

    /* ── THEME TOGGLE ── */
    .theme-toggle {
      background: none;
      border: 1px solid var(--rule);
      color: var(--muted);
      cursor: pointer;
      width: 32px;
      height: 32px;
      border-radius: 2px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.85rem;
      transition: all 0.2s;
      flex-shrink: 0;
    }
    .theme-toggle:hover {
      border-color: var(--ink);
      color: var(--ink);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; }

    body {
      background: var(--paper);
      color: var(--ink);
      font-family: var(--sans);
      font-size: 15px;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    /* ── LAYOUT ── */
    .container {
      max-width: 860px;
      margin: 0 auto;
      padding: 0 32px;
    }

    /* ── NAV ── */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      background: var(--paper);
      border-bottom: 1px solid var(--rule);
      padding: 0 32px;
    }
    nav .nav-inner {
      max-width: 860px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 56px;
    }
    .nav-logo {
      font-family: var(--serif);
      font-weight: 400;
      font-size: 1.05rem;
      letter-spacing: 0.01em;
      color: var(--ink);
      text-decoration: none;
    }
    .nav-links {
      display: flex;
      gap: 28px;
      list-style: none;
    }
    .nav-links a {
      font-family: var(--mono);
      font-size: 0.7rem;
      font-weight: 300;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      text-decoration: none;
      transition: color 0.2s;
    }
    .nav-links a:hover { color: var(--ink); }

    /* ── HERO ── */
    #home {
      padding-top: 120px;
      padding-bottom: 80px;
      border-bottom: 1px solid var(--rule);
    }
    .hero-grid {
      display: grid;
      grid-template-columns: 1fr 220px;
      gap: 56px;
      align-items: start;
    }
    .hero-photo .headshot-wrap {
      margin-top: 8px;
    }
    .hero-eyebrow {
      font-family: var(--mono);
      font-size: 0.68rem;
      font-weight: 300;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 20px;
      opacity: 0;
      animation: fadeUp 0.7s ease forwards 0.1s;
    }
    .hero-name {
      font-family: var(--serif);
      font-weight: 300;
      font-size: clamp(3rem, 7vw, 5.5rem);
      line-height: 1.02;
      letter-spacing: -0.01em;
      color: var(--ink);
      margin-bottom: 24px;
      opacity: 0;
      animation: fadeUp 0.7s ease forwards 0.2s;
    }
    .hero-name em {
      font-style: italic;
      font-weight: 300;
    }
    .hero-desc, .hero-desc p {
      max-width: 560px;
      font-size: 1rem;
      line-height: 1.7;
      color: var(--body-text);
    }
    .hero-desc {
      margin-bottom: 36px;
      opacity: 0;
      animation: fadeUp 0.7s ease forwards 0.35s;
    }
    .hero-links {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      opacity: 0;
      animation: fadeUp 0.7s ease forwards 0.5s;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 10px 20px;
      font-family: var(--mono);
      font-size: 0.7rem;
      font-weight: 400;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      text-decoration: none;
      border-radius: 2px;
      transition: all 0.2s;
    }
    .btn-primary {
      background: var(--ink);
      color: var(--paper);
    }
    .btn-primary:hover {
      background: var(--accent);
    }
    .btn-outline {
      border: 1px solid var(--rule);
      color: var(--ink);
    }
    .btn-outline:hover {
      border-color: var(--ink);
      background: var(--ink);
      color: var(--paper);
    }

    /* ── SECTION SHARED ── */
    section {
      padding: 72px 0;
      border-bottom: 1px solid var(--rule);
    }
    .section-label {
      font-family: var(--mono);
      font-size: 0.65rem;
      font-weight: 300;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 40px;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .section-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--rule);
    }
    .section-title {
      font-family: var(--serif);
      font-weight: 300;
      font-size: clamp(1.8rem, 4vw, 2.6rem);
      line-height: 1.15;
      margin-bottom: 12px;
    }

    /* ── ABOUT ── */
    .about-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 48px;
      align-items: start;
    }
    .about-text p {
      color: var(--body-text);
      margin-bottom: 14px;
      font-size: 0.97rem;
      line-height: 1.75;
    }
    .about-stats {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
    .headshot-wrap {
      width: 100%;
      overflow: hidden;
      border-radius: 2px;
    }
    .headshot {
      width: 100%;
      height: auto;
      display: block;
      object-fit: cover;
      filter: grayscale(15%);
      transition: filter 0.3s ease;
    }
    .headshot:hover {
      filter: grayscale(0%);
    }
    .stat-item {
      padding: 20px 0;
      border-top: 1px solid var(--rule);
    }
    .stat-num {
      font-family: var(--serif);
      font-size: 2.4rem;
      font-weight: 300;
      color: var(--accent);
      line-height: 1;
      margin-bottom: 4px;
    }
    .stat-label {
      font-family: var(--mono);
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
    }

    /* ── WRITING ── */
    .writing-grid {
      display: grid;
      gap: 0;
    }
    .writing-item {
      display: grid;
      grid-template-columns: 80px 1fr auto;
      gap: 24px;
      align-items: start;
      padding: 24px 0;
      border-top: 1px solid var(--rule);
      text-decoration: none;
      color: inherit;
      transition: background 0.15s;
    }
    .writing-item:hover .writing-title { color: var(--accent); }
    .writing-item:hover .writing-arrow { opacity: 1; transform: translateX(0); }
